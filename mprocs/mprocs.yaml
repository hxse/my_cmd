# 如果windows上无法显示输出, 就安装 scoop install pwsh
procs:
  scoop-update:
    shell:
      $select: os
      windows: "scoop update && scoop update *"
  cpa:
    shell:
      $select: os
      windows: 'D: && cd "D:\App\ai\cpa CLIProxyAPI\CLIProxyAPI_6.9.15_windows_amd64" && . "D:\App\ai\cpa CLIProxyAPI\CLIProxyAPI_6.9.15_windows_amd64\cli-proxy-api.exe"'
  active-windows-keyboard:
    shell:
      $select: os
      windows: 'D: && cd D:/my_repo/py-active-windows-keyboard && pdm run python ".\active_window.py" --path ".\config\config.json"'
  subconverter:
    shell:
      $select: os
      windows: 'D:\App\proxy\subconverter\subconverter\subconverter.exe'
  player:
    shell:
      $select: os
      windows: "D: && cd D:/my_repo/webdav-player && pnpm dev"
  mcp-playwright:
    shell:
      $select: os
      windows: "pnpx @playwright/mcp@latest --port 8931"
  ollama-server:
    shell:
      $select: os
      windows: "ollama serve"
  copyparty-e:
    shell:
      $select: os
      windows: 'copyparty --ftp 3912 -p 3913 -a hxse:asdf -v E:/::A,hxse --acao "192.168.10.110:3000" --acam "*"'
  copyparty-f:
    shell:
      $select: os
      windows: 'copyparty --ftp 3922 -p 3923 -a hxse:asdf -v F:/::A,hxse --acao "192.168.10.110:3000" --acam "*"'
